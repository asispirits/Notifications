<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notifications Widget Fullscreen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    #nw-open-widget {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      left: -10000px;
      top: -10000px;
    }

    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 2147483646;
      background: rgba(19, 43, 82, 0.88);
      color: #ffffff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.3;
      max-width: calc(100vw - 20px);
      display: none;
    }

    #status.show {
      display: block;
    }

    #secretBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 2147483647;
      border: 1px solid rgba(30, 72, 122, 0.35);
      background: rgba(255, 255, 255, 0.92);
      color: #1a4e86;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      display: none;
    }

    #secretBtn.show {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #diagPanel {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 2147483645;
      border-radius: 8px;
      background: rgba(19, 43, 82, 0.88);
      color: #ffffff;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      max-width: calc(100vw - 20px);
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #diagPanel.show {
      display: block;
    }

    #settingsOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.38);
      z-index: 2147483647;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #settingsOverlay.show {
      display: flex;
    }

    #settingsModal {
      width: min(480px, 100%);
      background: #ffffff;
      color: #1a4e86;
      border-radius: 12px;
      border: 1px solid #d4e7ff;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    #settingsModal h2 {
      margin: 0;
      font-size: 18px;
    }

    .field {
      font-size: 14px;
      color: #355b84;
      display: grid;
      gap: 8px;
    }

    .field label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid #9bc2ef;
      border-radius: 999px;
      background: #f3f9ff;
      color: #1a4e86;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn.primary {
      background: #1d63ff;
      color: #fff;
      border-color: #1d63ff;
    }

    .beamer_icon,
    .beamerTrigger,
    .beamer_defaultLauncher,
    [class*="beamer_icon"],
    [id*="beamer_icon"] {
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
      visibility: hidden !important;
    }

    #beamerNews,
    .beamerNews,
    #beamerOverlay,
    .beamerOverlay,
    .beamerAnnouncementBar,
    .beamer_announcement_bar,
    .beamerAnnouncement,
    .beamerAnnouncements,
    .beamerModal,
    .beamer-modal,
    .beamerContent,
    .beamer-content,
    .beamer_feed,
    iframe[src*="getbeamer.com"] {
      max-width: 100vw !important;
      max-height: 100vh !important;
      border-radius: 0 !important;
    }
  </style>

  <script>
    (function () {
      const cfg = window.__NW_CFG__ || {};

      const signalClose = function () {
        window.dispatchEvent(new Event('nw-beamer-close'));
      };

      window.beamer_config = {
        product_id: String(cfg.product_id || 'vEjlRlWp82033'),
        user_id: String(cfg.user_id || 'local-user'),
        selector: '#nw-open-widget',
        force_button: false,
        ignore_auto_open: true,
        auto_refresh: true,
        multi_user: cfg.segment_multi_user !== false,
        onClose: signalClose,
        onclose: signalClose
      };

      const segmentFilters = String(cfg.segment_filters || cfg.segment_role || '').trim();
      if (segmentFilters) {
        window.beamer_config.role = segmentFilters;
        window.beamer_config.filter = segmentFilters;
      }

      const segmentForceFilter = String(cfg.segment_force_filter || '').trim();
      if (segmentForceFilter) {
        window.beamer_config.force_filter = segmentForceFilter;
      }

      if (cfg.viewer_email) {
        window.beamer_config.user_email = String(cfg.viewer_email);
      }

      if (cfg.viewer_name) {
        const fullName = String(cfg.viewer_name);
        window.beamer_config.user_firstname = fullName;
        window.beamer_config.user_lastname = '';
      }

      window.__NW_BOOT__ = {
        autoOpen: cfg.auto_open_on_launch !== false,
        enableSecretMenu: Boolean(cfg.enable_secret_menu),
        appTitle: String(cfg.app_title || 'Notifications Widget Demo'),
        refreshMs: Number(cfg.refresh_ms || 30000),
        segmentFilters
      };
    })();
  </script>
  <script type="text/javascript" src="https://app.getbeamer.com/js/beamer-embed.js" defer="defer"></script>
</head>
<body>
  <a id="nw-open-widget" href="#beamerTrigger" aria-hidden="true" tabindex="-1">Open</a>
  <div id="status"></div>
  <button id="secretBtn" type="button" aria-label="Open settings">⚙</button>
  <div id="diagPanel"></div>

  <div id="settingsOverlay" role="dialog" aria-modal="true" aria-label="Secret settings">
    <div id="settingsModal">
      <h2>Secret Settings</h2>
      <div class="field">
        <label><input id="showStatus" type="checkbox" />Show status messages</label>
        <label><input id="showDiag" type="checkbox" />Show information panel</label>
      </div>
      <div class="actions">
        <button class="btn" id="reopenBtn" type="button">Re-open Widget</button>
        <button class="btn primary" id="closeSettingsBtn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const boot = window.__NW_BOOT__ || {};
      const statusEl = document.getElementById('status');
      const secretBtn = document.getElementById('secretBtn');
      const diagPanel = document.getElementById('diagPanel');
      const settingsOverlay = document.getElementById('settingsOverlay');
      const closeSettingsBtn = document.getElementById('closeSettingsBtn');
      const reopenBtn = document.getElementById('reopenBtn');
      const showStatus = document.getElementById('showStatus');
      const showDiag = document.getElementById('showDiag');

      let showStatusMessages = false;
      const lockWidgetOpen = true;
      const reopenCooldownMs = 1200;
      let lastReopenAttemptAt = 0;
      let refreshCount = 0;
      let reopenBurstTimer = null;

      function setStatus(text, sticky) {
        if (!showStatusMessages && !sticky) return;
        statusEl.textContent = text;
        statusEl.classList.add('show');
        if (!sticky) {
          window.setTimeout(() => statusEl.classList.remove('show'), 2200);
        }
      }

      function updateDiag() {
        diagPanel.textContent = [
          `App: ${boot.appTitle || 'Notifications Widget Demo'}`,
          `Product ID: ${window.beamer_config?.product_id || ''}`,
          `User ID: ${window.beamer_config?.user_id || ''}`,
          `Segments: ${boot.segmentFilters || '(none)'}`,
          `Refresh: ${Math.max(30000, Number(boot.refreshMs || 30000))} ms`
        ].join('\n');
      }

      function setDiagVisible(visible) {
        if (visible) {
          updateDiag();
          diagPanel.classList.add('show');
        } else {
          diagPanel.classList.remove('show');
        }
      }

      function getNodes() {
        const selectors = [
          '#beamerNews', '.beamerNews',
          '#beamerOverlay', '.beamerOverlay',
          '.beamerAnnouncementBar', '.beamer_announcement_bar',
          '.beamerAnnouncement', '.beamerAnnouncements',
          '.beamerModal', '.beamer-modal',
          '.beamerContent', '.beamer-content',
          '.beamer_feed',
          '[class*="beamerAnnouncement"]',
          '[class*="beamerFeed"]',
          '[class*="beamerContent"]',
          'iframe[src*="getbeamer.com"]'
        ];

        const seen = new Set();
        const nodes = [];
        for (const sel of selectors) {
          const list = document.querySelectorAll(sel);
          for (const node of list) {
            if (!(node instanceof HTMLElement)) continue;
            if (seen.has(node)) continue;
            seen.add(node);
            nodes.push(node);
          }
        }
        return nodes;
      }

      function isBeamerPanelNode(node) {
        const cls = (node.className || '').toString().toLowerCase();
        const id = (node.id || '').toString().toLowerCase();
        return id.includes('beamer') || cls.includes('beamer');
      }

      function forceFullscreen(node) {
        if (!(node instanceof HTMLElement)) return;
        if (!isBeamerPanelNode(node) && node.tagName !== 'IFRAME') return;

        const isOverlay = (node.id || '').toLowerCase().includes('overlay') || (node.className || '').toString().toLowerCase().includes('overlay');

        node.style.setProperty('position', 'fixed', 'important');
        node.style.setProperty('top', '0', 'important');
        node.style.setProperty('left', '0', 'important');
        node.style.setProperty('right', '0', 'important');
        node.style.setProperty('bottom', '0', 'important');
        node.style.setProperty('width', '100vw', 'important');
        node.style.setProperty('max-width', '100vw', 'important');
        node.style.setProperty('height', '100vh', 'important');
        node.style.setProperty('max-height', '100vh', 'important');
        node.style.setProperty('margin', '0', 'important');
        node.style.setProperty('border-radius', '0', 'important');
        node.style.setProperty('transform', 'none', 'important');
        node.style.setProperty('z-index', isOverlay ? '2147482999' : '2147483000', 'important');

        if (isOverlay) {
          node.style.setProperty('background', 'transparent', 'important');
        }
      }

      function forceFullscreenAll() {
        const nodes = getNodes();
        for (const node of nodes) {
          forceFullscreen(node);

          if (node.tagName !== 'IFRAME') {
            const iframe = node.querySelector('iframe');
            if (iframe instanceof HTMLElement) {
              forceFullscreen(iframe);
            }
          }
        }
      }

      function hasVisiblePanel() {
        const nodes = getNodes();
        return nodes.some((node) => {
          const style = window.getComputedStyle(node);
          return style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
        });
      }

      function openWidget() {
        try {
          if (window.Beamer && typeof window.Beamer.open === 'function') {
            window.Beamer.open();
          }
          if (window.Beamer && typeof window.Beamer.show === 'function') {
            window.Beamer.show();
          }
        } catch {
        }

        const primaryTrigger = document.getElementById('nw-open-widget');
        if (primaryTrigger instanceof HTMLElement) {
          primaryTrigger.click();
        }

        const fallback = document.querySelector('.beamer_icon, .beamerTrigger, .beamer_defaultLauncher, a[href="#beamerTrigger"]');
        if (fallback instanceof HTMLElement) {
          fallback.click();
        }
      }

      function requestOpen(reason) {
        const now = Date.now();
        if (now - lastReopenAttemptAt < reopenCooldownMs) return;

        lastReopenAttemptAt = now;
        openWidget();
        forceFullscreenAll();

        if (reason) {
          setStatus(reason, false);
        }
      }

      function startReopenBurst() {
        if (reopenBurstTimer) {
          window.clearInterval(reopenBurstTimer);
          reopenBurstTimer = null;
        }

        let attempts = 0;
        reopenBurstTimer = window.setInterval(() => {
          attempts += 1;
          requestOpen();

          if (hasVisiblePanel() || attempts >= 20) {
            window.clearInterval(reopenBurstTimer);
            reopenBurstTimer = null;
          }
        }, 300);
      }

      if (boot.enableSecretMenu) {
        secretBtn.classList.add('show');
        secretBtn.addEventListener('click', () => settingsOverlay.classList.add('show'));
        closeSettingsBtn.addEventListener('click', () => settingsOverlay.classList.remove('show'));
        settingsOverlay.addEventListener('click', (e) => {
          if (e.target === settingsOverlay) settingsOverlay.classList.remove('show');
        });

        showStatus.addEventListener('change', () => {
          showStatusMessages = showStatus.checked;
          if (!showStatusMessages) statusEl.classList.remove('show');
        });

        showDiag.addEventListener('change', () => setDiagVisible(showDiag.checked));
        reopenBtn.addEventListener('click', () => {
          requestOpen('Re-open requested.');
        });
      }

      window.addEventListener('nw-beamer-close', () => {
        if (!lockWidgetOpen) return;
        window.setTimeout(() => {
          requestOpen('Widget restored.');
        }, 180);
        startReopenBurst();
      });

      const observer = new MutationObserver(() => {
        forceFullscreenAll();
      });
      observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true });

      window.addEventListener('resize', () => {
        forceFullscreenAll();
      });

      window.setInterval(() => {
        forceFullscreenAll();
      }, 1000);

      window.setInterval(() => {
        forceFullscreenAll();

        if (!lockWidgetOpen) return;
        if (hasVisiblePanel()) return;

        requestOpen('Widget restored.');
      }, 2200);

      // Some close paths do not reliably trigger callbacks; keep-open fallback.
      window.setInterval(() => {
        if (!lockWidgetOpen) return;
        requestOpen();
      }, 8000);

      function hardResetWidget() {
        try {
          if (window.Beamer && typeof window.Beamer.removeIframe === 'function') {
            window.Beamer.removeIframe();
          }
        } catch {
        }

        window.setTimeout(() => {
          requestOpen();
          forceFullscreenAll();
        }, 180);
      }

      function refreshWidgetFeed(useHardReset) {
        try {
          if (window.Beamer && typeof window.Beamer.update === 'function') {
            // Trigger a light refresh without forcing iframe teardown.
            window.Beamer.update({ _nw_refresh_nonce: String(Date.now()) });
          }
        } catch {
        }

        try {
          if (window.Beamer && typeof window.Beamer.appendAlert === 'function') {
            // Ask Beamer to pull the latest announcements.
            window.Beamer.appendAlert(true, true);
          }
        } catch {
        }

        try {
          if (window.Beamer && typeof window.Beamer.sendMessageToIframe === 'function') {
            window.Beamer.sendMessageToIframe('updatesAvailable:{"immediate":true}');
          }
        } catch {
        }

        if (useHardReset) {
          hardResetWidget();
        }

        forceFullscreenAll();
      }

      const refreshMs = Math.max(30000, Number(boot.refreshMs || 30000));
      const hardRefreshEveryMs = Math.max(120000, refreshMs * 4);
      const hardRefreshEveryTicks = Math.max(1, Math.round(hardRefreshEveryMs / refreshMs));
      window.setInterval(() => {
        refreshCount += 1;
        const useHardReset = refreshCount % hardRefreshEveryTicks === 0;
        refreshWidgetFeed(useHardReset);
      }, refreshMs);

      if (boot.autoOpen) {
        let attempts = 0;
        let visibleStreak = 0;

        const timer = window.setInterval(() => {
          attempts += 1;

          requestOpen();

          if (hasVisiblePanel()) {
            visibleStreak += 1;
          } else {
            visibleStreak = 0;
          }

          if (visibleStreak >= 3) {
            setStatus('Widget opened in fullscreen mode.', false);
            window.clearInterval(timer);
            return;
          }

          if (attempts >= 240) {
            setStatus('Auto-open timed out. Use secret settings > Re-open Widget.', true);
            window.clearInterval(timer);
          }
        }, 250);
      }
    })();
  </script>
</body>
</html>
